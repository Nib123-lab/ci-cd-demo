name: Weekly Report

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate the CSV report
        run: python generate_report.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report
          path: weekly_report_*.csv
          retention-days: 30